spring.application.name=session8-agent-skills
server.port=8080

# OpenAI Configuration
spring.ai.openai.chat.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-5
spring.ai.model.chat=openai

# Disable unused auto-configs
spring.ai.model.embedding=none
spring.ai.model.embedding.text=none
spring.ai.model.embedding.multimodal=none
spring.ai.model.image=none
spring.ai.model.audio.transcription=none
spring.ai.model.audio.speech=none
spring.ai.model.moderation=none

# Logging configuration to see skill invocations
logging.level.org.springframework.ai=DEBUG
logging.level.org.springaicommunity.agent=DEBUG
logging.level.tools.muthuishere.session8=DEBUG
