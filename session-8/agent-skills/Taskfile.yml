version: '3'

dotenv: ['.env']

tasks:
  build:
    desc: Build fat jar
    cmds:
      - ./gradlew clean build

  dev:
    desc: Run Spring Boot with fast startup and auto-restart
    cmds:
      - ./gradlew bootRun

  test:
    desc: Run HTTP tests
    cmds:
      - ijhttp -t 120000 --env-file requests/http-client.env.json --env dev requests/session8/agentskills.http


  personal-test:
    desc: Run HTTP tests for personal skills (group chat personas)
    cmds:
      - ijhttp -t 120000 --env-file requests/http-client.env.json --env dev requests/session8/personalskills.http

  basic-test:
    desc: Run HTTP tests for basic skills
    cmds:
      - ijhttp -t 120000 --env-file requests/http-client.env.json --env dev requests/session8/basicskills.http

  clean-gradle:
    desc: Stop all Gradle daemons and clean cache
    cmds:
      - ./gradlew --stop
      - echo "All Gradle daemons stopped."
